<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 案件处理启动器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-card h1 {
            text-align: center;
            color: #1a1a2e;
            font-size: 22px;
            margin-bottom: 8px;
        }
        .login-card .sub {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            transition: 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        .btn-outline {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }
        .btn-outline:hover { background: #eee; }
        .error {
            color: #e74c3c;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        .error.show { display: block; }
        .tab-bar {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #888;
            border-bottom: 2px solid transparent;
            font-size: 14px;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .info { text-align: center; font-size: 12px; color: #aaa; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>📋 案件处理启动器</h1>
        <p class="sub">请登录后使用</p>

        <div class="tab-bar">
            <div class="tab active" data-tab="login">登录</div>
            <div class="tab" data-tab="register">注册</div>
        </div>

        <!-- 登录 -->
        <div id="tab-login" class="tab-content active">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="输入用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="输入密码" autocomplete="current-password">
            </div>
            <button class="btn btn-primary" onclick="doLogin()">登 录</button>
            <div class="error" id="loginError"></div>
        </div>

        <!-- 注册 -->
        <div id="tab-register" class="tab-content">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" placeholder="至少2个字符">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword" placeholder="至少4个字符">
            </div>
            <div class="form-group">
                <label>显示名称（可选）</label>
                <input type="text" id="regDisplayName" placeholder="你的姓名或昵称">
            </div>
            <button class="btn btn-primary" onclick="doRegister()">注 册</button>
            <div class="error" id="regError"></div>
        </div>

        <div class="info">注册后自动登录，token 有效期7天</div>
    </div>

    <script>
        // Tab切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        // 回车键提交
        document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        document.getElementById('regPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function saveToken(token, user) {
            localStorage.setItem('auth_token', token);
            localStorage.setItem('auth_user', JSON.stringify(user));
        }

        async function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!username || !password) { showError('loginError', '请输入用户名和密码'); return; }

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await resp.json();
                if (result.success) {
                    saveToken(result.token, { username: result.username, company: result.company, display_name: result.display_name });
                    window.location.href = '/';
                } else {
                    showError('loginError', result.error || '登录失败');
                }
            } catch (e) {
                showError('loginError', '网络错误: ' + e.message);
            }
        }

        async function doRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const display_name = document.getElementById('regDisplayName').value.trim();
            if (!username || !password) { showError('regError', '请输入用户名和密码'); return; }

            try {
                const resp = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, display_name })
                });
                const result = await resp.json();
                if (result.success) {
                    // 注册成功后自动登录
                    const loginResp = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const loginResult = await loginResp.json();
                    if (loginResult.success) {
                        saveToken(loginResult.token, { username: loginResult.username, company: loginResult.company, display_name: loginResult.display_name });
                    }
                    window.location.href = '/';
                } else {
                    showError('regError', result.error || '注册失败');
                }
            } catch (e) {
                showError('regError', '网络错误: ' + e.message);
            }
        }

        // 如果已经登录则跳转
        const token = localStorage.getItem('auth_token');
        if (token) {
            fetch('/api/auth/verify?token=' + encodeURIComponent(token))
                .then(r => r.json())
                .then(data => {
                    if (data.success) window.location.href = '/';
                })
                .catch(() => {});
        }
    </script>
</body>
</html>
